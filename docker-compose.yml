services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-app_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend-api
    ports:
      - "3001:3001"
    env_file:
      - ./backend-api/.env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-rootpassword}
      - DB_NAME=${DB_NAME:-app_db}
    depends_on:
      - db

  frontend:
    build: ./frontend-ui
    ports:
      - "5173:5173"
    env_file:
      - ./frontend-ui/.env
    depends_on:
      - backend

volumes:
  mysql_data:
